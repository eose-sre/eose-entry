apiVersion: batch/v1
kind: Job
metadata:
  name: gpu-test-a10
  namespace: eose-entry
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      tolerations:
      - key: "sku"
        operator: "Equal"
        value: "gpu"
        effect: "NoSchedule"
      - key: "kubernetes.azure.com/scalesetpriority"
        operator: "Equal"
        value: "spot"
        effect: "NoSchedule"
      nodeSelector:
        pool: a10
      containers:
      - name: gpu-test
        image: eoseentry.azurecr.io/mrcp-agent:v3.1
        command: ["sh", "-c", "nvidia-smi && echo GPU_OK || echo NO_GPU_YET"]
        resources:
          limits:
            nvidia.com/gpu: "1"
          requests:
            nvidia.com/gpu: "1"
