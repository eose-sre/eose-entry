apiVersion: batch/v1
kind: Job
metadata:
  name: gpu-test-a10
  namespace: eose-entry
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      tolerations:
      - key: "sku"
        operator: "Equal"
        value: "gpu"
        effect: "NoSchedule"
      - key: "kubernetes.azure.com/scalesetpriority"
        operator: "Equal"
        value: "spot"
        effect: "NoSchedule"
      nodeSelector:
        pool: a10
      containers:
      - name: gpu-test
        image: nvidia/cuda:12.1.0-base-ubuntu22.04
        command: ["nvidia-smi"]
        resources:
          limits:
            nvidia.com/gpu: 1
