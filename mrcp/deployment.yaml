apiVersion: apps/v1
kind: Deployment
metadata:
  name: mrcp-agent
  namespace: eose-entry
  labels:
    app: mrcp-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mrcp-agent
  template:
    metadata:
      labels:
        app: mrcp-agent
    spec:
      serviceAccountName: eose-operator
      automountServiceAccountToken: true
      containers:
      - name: mrcp
        image: eoseentry.azurecr.io/mrcp-agent:v1
        env:
        - name: SILO
          value: "ct-fac"
        - name: MEROSTONE_URL
          value: "https://merostone.eose.ca"
        - name: REPORT_INTERVAL
          value: "60000"
        - name: POLL_INTERVAL
          value: "10000"
        resources:
          requests: {cpu: 20m, memory: 32Mi}
          limits: {cpu: 100m, memory: 64Mi}
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
