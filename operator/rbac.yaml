apiVersion: v1
kind: ServiceAccount
metadata:
  name: eose-operator
  namespace: eose-entry
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: eose-cluster-viewer
rules:
- apiGroups: [""]
  resources: ["pods","nodes","namespaces","services","events","configmaps"]
  verbs: ["get","list","watch"]
- apiGroups: ["apps"]
  resources: ["deployments","daemonsets","statefulsets","replicasets"]
  verbs: ["get","list","watch"]
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["get","list"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["nodes","pods"]
  verbs: ["get","list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: eose-operator-viewer
subjects:
- kind: ServiceAccount
  name: eose-operator
  namespace: eose-entry
roleRef:
  kind: ClusterRole
  name: eose-cluster-viewer
  apiGroup: rbac.authorization.k8s.io
