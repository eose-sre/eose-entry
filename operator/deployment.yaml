apiVersion: apps/v1
kind: Deployment
metadata:
  name: eose-operator
  namespace: eose-entry
  labels:
    app: eose-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eose-operator
  template:
    metadata:
      labels:
        app: eose-operator
    spec:
      serviceAccountName: eose-operator
      containers:
      - name: operator
        image: eoseentry.azurecr.io/operator:latest
        env:
        - name: SILO
          value: "ct-fac"
        - name: MEROSTONE_URL
          value: "https://merostone.eose.ca"
        - name: INTERVAL_MS
          value: "60000"
        resources:
          requests: {cpu: 20m, memory: 32Mi}
          limits: {cpu: 100m, memory: 64Mi}
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ALL]
